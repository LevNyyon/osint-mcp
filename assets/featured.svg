<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter">
  <rect width="1200" height="630" fill="#FAFAF9"/>
  <rect x="0" y="0" width="1200" height="8" fill="#6C5CE7"/>

  <!-- radial node motif, top right -->
  <g stroke="#E7E5E4" stroke-width="1.5" fill="none">
    <circle cx="1010" cy="150" r="120"/>
    <circle cx="1010" cy="150" r="70"/>
  </g>
  <g>
    <circle cx="1010" cy="150" r="9" fill="#6C5CE7"/>
    <circle cx="1130" cy="150" r="5" fill="#0A0A0A"/>
    <circle cx="890" cy="150" r="5" fill="#0A0A0A"/>
    <circle cx="1010" cy="30" r="5" fill="#0A0A0A"/>
    <circle cx="1010" cy="270" r="5" fill="#0A0A0A"/>
    <circle cx="1080" cy="80" r="4" fill="#78716C"/>
    <circle cx="940" cy="220" r="4" fill="#78716C"/>
  </g>

  <text x="90" y="120" font-family="JetBrains Mono" font-size="20" letter-spacing="6" fill="#78716C">NYYON  //  OPEN SOURCE</text>

  <text x="86" y="300" font-size="132" font-weight="700" letter-spacing="-4" fill="#0A0A0A">osint-mcp</text>

  <text x="90" y="368" font-size="34" fill="#0A0A0A">Watch the open web for the topics, brands, and</text>
  <text x="90" y="412" font-size="34" fill="#0A0A0A">sites you care about. Your model decides what matters.</text>

  <!-- source chips -->
  <g font-family="JetBrains Mono" font-size="20" fill="#0A0A0A">
    <g>
      <rect x="90"  y="470" width="155" height="48" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
      <text x="167" y="500" text-anchor="middle">Hacker News</text>
    </g>
    <g>
      <rect x="262" y="470" width="110" height="48" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
      <text x="317" y="500" text-anchor="middle">Reddit</text>
    </g>
    <g>
      <rect x="389" y="470" width="160" height="48" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
      <text x="469" y="500" text-anchor="middle">DuckDuckGo</text>
    </g>
    <g>
      <rect x="566" y="470" width="185" height="48" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
      <text x="658" y="500" text-anchor="middle">Stack Overflow</text>
    </g>
    <g>
      <rect x="768" y="470" width="115" height="48" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
      <text x="825" y="500" text-anchor="middle">GitHub</text>
    </g>
    <g>
      <rect x="900" y="470" width="135" height="48" rx="8" fill="#FFFFFF" stroke="#6C5CE7"/>
      <text x="967" y="500" text-anchor="middle" fill="#6C5CE7">RSS feeds</text>
    </g>
  </g>

  <text x="90" y="585" font-family="JetBrains Mono" font-size="22" fill="#78716C">An MCP server by</text>
  <text x="308" y="585" font-family="JetBrains Mono" font-size="22" font-weight="700" fill="#0A0A0A">nyyon.com</text>
